services:
  backend:
    build:
      target: production
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://fourier.babb.dev}
    restart: unless-stopped

  frontend:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_BASE_URL: ${VITE_BASE_URL:-/}
    restart: unless-stopped

  mongo:
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["${HTTP_PORT:-8091}:80"]
    volumes:
      - ./nginx/fourier.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend, frontend]
    networks: [app-network]
    restart: unless-stopped
